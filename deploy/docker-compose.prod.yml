version: '3.8'

services:
  frontend:
    image: ${DOCKER_USERNAME}/polyglot-frontend:latest
    ports:
      - "80:80"
    networks:
      - polyglot-network

  backend:
    image: ${DOCKER_USERNAME}/polyglot-backend:latest
    ports:
      - "5000:5000"
    environment:
      - ASPNETCORE_URLS=http://+:5000
    networks:
      - polyglot-network

  worker:
    image: ${DOCKER_USERNAME}/polyglot-worker:latest
    environment:
      - REDIS_URL=redis://redis:6379
    networks:
      - polyglot-network

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    networks:
      - polyglot-network

networks:
  polyglot-network:
    driver: bridge
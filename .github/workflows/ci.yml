name: CI Pipeline

on:
  push:
    branches: [ main, feature/* ]
  pull_request:
    branches: [ main ]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore
        working-directory: ./backend-dotnet

      - name: Build backend
        run: dotnet build --no-restore
        working-directory: ./backend-dotnet

      - name: Run backend tests
        run: dotnet test --no-build --verbosity normal --filter "Category!=Integration"
        working-directory: ./backend-dotnet

  test-worker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r project/requirements.txt
        working-directory: ./worker-python

      - name: Run Python tests
        run: python -m pytest project/tests/ -v
        working-directory: ./worker-python

  build-images:
    runs-on: ubuntu-latest
    needs: [test-backend, test-worker]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend-dotnet
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/polyglot-backend:latest

      - name: Build and push worker
        uses: docker/build-push-action@v5
        with:
          context: ./worker-python
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/polyglot-worker:latest

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend-js
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/polyglot-frontend:latest
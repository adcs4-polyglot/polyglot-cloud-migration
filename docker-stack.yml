version: '3.8'

services:

  frontend:
    image: polyglot-cloud-migration-frontend:latest
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - polyglot-network
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  backend:
    image: polyglot-cloud-migration-backend:latest
    ports:
      - "5000:5000"
    environment:
      - ASPNETCORE_URLS=http://+:5000
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
    networks:
      - polyglot-network
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  worker:
    image: polyglot-cloud-migration-worker:latest
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
    networks:
      - polyglot-network
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    networks:
      - polyglot-network
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

networks:
  polyglot-network:
    driver: overlay
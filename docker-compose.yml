version: '3.8'

services:

  frontend:
    build: ./frontend-js
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - polyglot-network

  backend:
    build: ./backend-dotnet
    ports:
      - "5000:5000"
    environment:
      - ASPNETCORE_URLS=http://+:5000
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
    networks:
      - polyglot-network

  worker:
    build: ./worker-python
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
    networks:
      - polyglot-network

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    networks:
      - polyglot-network

networks:
  polyglot-network:
    driver: bridge